{% extends "base.html" %}

{% block content %}
<section class="stats-grid">
    {% for card in summary_cards %}
    <article class="stat-card tone-{{ card.tone }}">
        <span>{{ card.label }}</span>
        <strong>{{ card.value }}</strong>
    </article>
    {% endfor %}
</section>

<section class="card">
    <div class="section-head">
        <div>
            <span class="section-kicker">任务监控</span>
            <h2>任务列表</h2>
        </div>
        <a class="text-link" href="/">返回上传页</a>
    </div>
    <p class="hint">存在排队或处理中任务时，页面会每 10 秒自动刷新。</p>
    {% include "task_table.html" %}
</section>
{% endblock %}
